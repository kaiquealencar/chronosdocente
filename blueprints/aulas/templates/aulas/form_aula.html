{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-80px)] p-4">

    <div class="w-full max-w-2xl bg-white p-8 md:p-10 rounded-3xl shadow-2xl border border-white">
        
        <div class="flex flex-col items-center mb-8 text-center">
            <div class="relative flex items-center justify-center w-20 h-20 bg-indigo-50 rounded-2xl mb-4 border-2 border-indigo-100 -rotate-3 hover:rotate-0 transition-transform duration-300">
                <span class="material-symbols-outlined text-5xl text-indigo-400">calendar_add_on</span>
                <div class="absolute -top-2 -right-2 bg-indigo-600 rounded-full w-9 h-9 flex items-center justify-center border-4 border-white shadow-lg">
                    <span class="material-symbols-outlined text-white text-lg">
                        {{ 'edit' if aula else 'add' }}
                    </span>
                </div>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">
                {{ 'Editar' if aula else 'Agendar' }} <span class="text-indigo-600">Aula</span>
            </h1>
        </div>

        <form action="{{ url_for('aulas.aulas_edit', id=aula.id) if (aula and aula.id) else url_for('aulas.aulas_create') }}" method="POST" class="space-y-5">            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="dia_aula" class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">Data da Aula</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-indigo-500 transition-colors">event</span>
                        <input type="date" id="dia_aula" name="dia_aula" required
                            class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-gray-200 rounded-2xl outline-none focus:bg-white focus:ring-2 focus:ring-indigo-400 transition-all"
                            value="{{ aula.dia_aula if aula is mapping else (aula.dia_aula.strftime('%Y-%m-%d') if aula and aula.dia_aula else '') }}">
                    </div>
                </div>

                <div>
                    <label for="quantidade_aulas" class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">Qtd. de Aulas (H/A)</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-indigo-500 transition-colors">format_list_numbered</span>
                        <input type="number" id="quantidade_aulas" name="quantidade_aulas" min="1" required
                            class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-gray-200 rounded-2xl outline-none focus:bg-white focus:ring-2 focus:ring-indigo-400 transition-all"
                            placeholder="Ex: 2"
                            value="{{ aula.quantidade_aulas if aula else '1' }}">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="hora_inicio" class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">Início</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-indigo-500 transition-colors">schedule</span>
                        <input type="time" id="hora_inicio" name="hora_inicio" required
                            class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-gray-200 rounded-2xl outline-none focus:bg-white focus:ring-2 focus:ring-indigo-400 transition-all"
                            value="{{ aula.hora_inicio if aula is mapping else (aula.hora_inicio.strftime('%H:%M') if aula and aula.hora_inicio else '') }}">
                    </div>
                </div>
                <div>
                    <label for="hora_fim" class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">Término</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-indigo-500 transition-colors">history_toggle_off</span>
                        <input type="time" id="hora_fim" name="hora_fim" required
                            class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-gray-200 rounded-2xl outline-none focus:bg-white focus:ring-2 focus:ring-indigo-400 transition-all"
                            value="{{ aula.hora_fim if aula is mapping else (aula.hora_fim.strftime('%H:%M') if aula and aula.hora_fim else '') }}">
                    </div>
                </div>
            </div>

            <div>
                <label for="escola_id" class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">Escola</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-indigo-500 transition-colors">school</span>
                    <select id="escola_id" name="escola_id" required
                        class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-gray-200 rounded-2xl outline-none focus:bg-white focus:ring-2 focus:ring-indigo-400 appearance-none transition-all">
                        <option value="">Selecione sua Escola</option>
                        {% for escola in escolas %}
                        <option value="{{ escola.id }}" {{ 'selected' if aula and aula.escola_id == escola.id }}>
                            {{ escola.nome }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="disciplina_id" class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">Disciplina</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-indigo-500 transition-colors">book</span>
                        <select id="disciplina_id" name="disciplina_id" required
                            class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-gray-200 rounded-2xl outline-none focus:bg-white focus:ring-2 focus:ring-indigo-400 appearance-none transition-all">
                            <option value="">Selecione...</option>
                            {% for disciplina in disciplinas %}
                            <option value="{{ disciplina.id }}" {{ 'selected' if aula and aula.disciplina_id == disciplina.id }}>
                                {{ disciplina.nome }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div>
                    <label for="serie_id" class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">Série/Turma</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-indigo-500 transition-colors">groups</span>
                        <select id="serie_id" name="serie_id" required
                            class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-gray-200 rounded-2xl outline-none focus:bg-white focus:ring-2 focus:ring-indigo-400 appearance-none transition-all">
                            <option value="">Selecione...</option>
                            {% for serie in series %}
                            <option value="{{ serie.id }}" {{ 'selected' if aula and aula.serie_id == serie.id }}>
                                {{ serie.nome }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 pt-4">
                <a href="{{ url_for('aulas.aulas_view') }}" 
                   class="flex-1 inline-flex items-center justify-center px-6 py-4 border border-gray-200 text-gray-600 font-semibold rounded-2xl hover:bg-gray-50 transition-all active:scale-[0.98]">
                    Cancelar
                </a>
                <button type="submit" 
                    class="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98] hover:-translate-y-0.5 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-xl">save</span>
                    {{ 'Salvar Alterações' if aula else 'Agendar Aula' }}
                </button>
            </div>
        </form>

    </div>
</div>
{% endblock %}
