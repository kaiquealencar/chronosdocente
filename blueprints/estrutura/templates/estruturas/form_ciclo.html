{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto p-8">
    <div class="bg-white rounded-[2rem] shadow-xl shadow-slate-100 border border-slate-50 p-10">
        <h2 class="text-3xl font-bold text-slate-800 mb-8 tracking-tight">
            {{ 'Editar' if ciclo else 'Novo' }} <span class="text-indigo-600">Ciclo</span>
        </h2>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-600 uppercase mb-2 ml-1">Nome do Ciclo</label>
                <input type="text" name="nome" value="{{ ciclo.nome if ciclo else '' }}" required
                       class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 transition-all text-lg font-medium text-slate-700" 
                       placeholder="Ex: Fundamental I, Ensino Médio...">
            </div>

            {% if not ciclo %}
            <div>
                <label class="block text-sm font-bold text-slate-600 uppercase mb-2 ml-1">Escola</label>
                <select name="escola_id" required class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 appearance-none font-medium text-slate-700">
                    {% for escola in escolas %}
                        <option value="{{ escola.id }}">{{ escola.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}

            <div class="w-1/3">
                <label class="block text-sm font-bold text-slate-600 uppercase mb-2 ml-1">Ordem</label>
                <input type="number" name="ordem" value="{{ ciclo.ordem if ciclo else 1 }}" 
                       class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 font-medium text-slate-700">
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all">
                    Salvar Ciclo
                </button>
                <a href="{{ url_for('estruturas.estrutura_view') }}" class="px-8 py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl hover:bg-slate-200 transition-all text-center">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
